defaults:
  - model: pythia_1b
  - _self_

# Dataset is hard-coded in spalf/data/store.py to monology/pile-uncopyrighted.
# SPALF is deliberately specialized to this corpus; see audit in
# commit history for rationale.

total_tokens: 1_000_000_000

# Hardware constraints.
batch_size: 4096
seq_len: 128

# UX preferences.
log_interval: 100
checkpoint_interval: 5000

seed: 42
output_dir: "runs/default"
resume_from_checkpoint: ""
checkpoint_path: ""

# Vocabulary cap (0 = use full vocabulary).
# Model-side knob for large-vocabulary models to bound memory.
V_cap: 0

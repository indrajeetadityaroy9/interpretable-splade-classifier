defaults:
  - model: pythia_1b
  - _self_

dataset: "monology/pile-uncopyrighted"
dataset_config: null
text_column: "text"
dataset_split: "train"
total_tokens: 1_000_000_000

# Hardware constraints.
batch_size: 4096
seq_len: 128

# UX preferences.
log_interval: 100
checkpoint_interval: 5000

seed: 42
output_dir: "runs/default"
resume_from_checkpoint: ""
checkpoint_path: ""

# Vocabulary cap (0 = use full vocabulary).
# Set in model configs for large-vocabulary models to bound memory.
V_cap: 0
